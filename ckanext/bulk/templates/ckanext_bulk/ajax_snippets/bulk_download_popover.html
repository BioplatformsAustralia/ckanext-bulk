
{% asset 'ckanext-bulk/bulk_js' %}
{% asset 'ckanext-bulk/bulk_css' %}
<div class="bulkdl">
  <div class="bulkdl-lr">
      <a tabindex="0" role ="button" class="btn btn-default"
              data-module="bulk_download_popover"
              data-module-title="A zip archive will download. Extract it, and then follow the instructions in the README file to download this data in bulk."
              data-module-wording="{% snippet 'ckanext_bulk/snippets/bulk_explanation.html' %}"
              data-module-url="{{ url }}">
    <i class="fa fa-download"></i>{{ _(' Bulk download (metadata and data)') }}
      </a>
      {% if package_id and g.user %}
      {% asset 'ckanext-bpatheme/galaxy-send-js' %}
      <a href="#"
         class="btn btn-default"
         data-module="galaxy_send"
         data-module-package-id="{{ package_id }}"
         data-module-galaxy-url="{{ h.get_galaxy_url() }}">
          <i class="fa fa-rocket"></i>{{ _(' Send to Galaxy Australia') }}
      </a>
      {% endif %}
      </div>
</div>
